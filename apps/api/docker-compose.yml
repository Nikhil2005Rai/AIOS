version: '3.8'

services:
  # FastAPI Web Server
  api:
    build: .
    container_name: ai_os_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Background Worker for document ingestion & chat jobs
  worker:
    build: .
    container_name: ai_os_worker
    restart: always
    env_file:
      - .env
    command: python -m app.worker
